# ============================================
# 教培 AI 备课 + 学情分析工具 - 全局配置
# ============================================

app:
  name: "教培AI智能备课与学情分析系统"
  version: "1.0.0"
  debug: true
  host: "0.0.0.0"
  port: 8000

# 数据库配置
database:
  url: "postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"
  echo: false
  pool_size: 10
  max_overflow: 20

# Redis 缓存配置
redis:
  host: "${REDIS_HOST}"
  port: 6379
  db: 0
  password: "${REDIS_PASSWORD}"
  ttl:
    prompt_cache: 3600      # 提示词缓存 1 小时
    session_cache: 1800     # 会话缓存 30 分钟
    analytics_cache: 300    # 分析结果缓存 5 分钟

# AI 引擎配置
ai:
  provider: "dashscope"           # dashscope | openai
  model: "qwen-plus"             # 默认模型
  models:
    lesson_prep: "qwen-plus"     # 备课模块使用的模型
    analytics: "qwen-plus"       # 学情分析模型
    personalization: "qwen-turbo" # 个性化推荐模型（速度优先）
  temperature: 0.7
  max_tokens: 4096
  top_p: 0.9
  stream: true                    # 默认启用流式输出

# 提示词管理
prompts:
  base_dir: "src/prompts"
  hot_reload: true                # 开发模式下热更新
  cache_enabled: true
  default_version: "latest"

# 学科配置
subjects:
  - id: "math"
    name: "数学"
    grades: ["七年级", "八年级", "九年级", "高一", "高二", "高三"]
  - id: "chinese"
    name: "语文"
    grades: ["七年级", "八年级", "九年级", "高一", "高二", "高三"]
  - id: "english"
    name: "英语"
    grades: ["七年级", "八年级", "九年级", "高一", "高二", "高三"]
  - id: "physics"
    name: "物理"
    grades: ["八年级", "九年级", "高一", "高二", "高三"]
  - id: "chemistry"
    name: "化学"
    grades: ["九年级", "高一", "高二", "高三"]

# 学情分析配置
analytics:
  risk_thresholds:
    high: 0.8                     # 高风险阈值
    medium: 0.5                   # 中风险阈值
    low: 0.3                      # 低风险阈值
  trend_window: 5                 # 趋势分析滑动窗口（次）
  mastery_threshold: 0.8          # 掌握度阈值

# 个性化推荐配置
personalization:
  max_cognitive_load: 5           # 单次最大认知负荷（知识点数）
  mastery_required: 0.8           # 进入下一阶段的掌握度要求
  spaced_repetition:
    intervals: [1, 3, 7, 14, 30] # 间隔重复天数
  flow_state:
    success_rate_min: 0.6         # 心流区间最低成功率
    success_rate_max: 0.85        # 心流区间最高成功率

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
  file: "logs/app.log"
