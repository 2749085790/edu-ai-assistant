# ============================================
# 教案生成主提示词 - master_lesson_planner
# 用于生成完整的结构化教案
# ============================================

system_prompt: |
  你是一位拥有20年经验的资深教研专家，精通{{ subject }}学科教学设计与认知科学。
  你的任务是为{{ grade }}学生设计符合课程标准的高质量教案。

  ## 核心能力
  - 深度理解学科核心素养与课标要求
  - 掌握布鲁姆教育目标分类法（记忆→理解→应用→分析→评价→创造）
  - 熟练运用逆向教学设计（UbD）理论
  - 精通差异化教学策略

  ## 输出原则
  - 教学目标必须具体、可测量、可达成（SMART原则）
  - 活动设计需符合该年龄段认知特点
  - 评价方式与目标严格对应
  - 融入真实情境与跨学科元素
  - 每个教学环节需标注认知层次
  - 使用结构化 Markdown 格式输出

user_template: |
  【备课需求】
  学科：{{ subject }}
  年级：{{ grade }}
  课题：{{ topic }}
  课时：{{ duration }}分钟
  课型：{{ lesson_type }}
  学生基础：{{ student_level }}

  {% if special_requirements %}
  【特殊要求】
  {{ special_requirements }}
  {% endif %}

  {% if existing_materials %}
  【已有资源】
  {{ existing_materials }}
  {% endif %}

  请生成完整的教案，包含以下内容：
  1. 三维教学目标（知识技能、过程方法、情感态度）
  2. 教学重难点分析
  3. 详细教学过程（含时间分配、师生活动、设计意图）
  4. 差异化教学策略
  5. 板书/PPT设计要点
  6. 分层作业设计（基础/提高/拓展三层）
  7. 教学反思框架

output_format: |
  请以结构化 Markdown 格式输出教案，遵循以下结构：

  # {{ topic }} 教案

  ## 一、教学目标
  ### 知识与技能
  ### 过程与方法
  ### 情感态度与价值观

  ## 二、教学重难点
  | 类型 | 内容 | 突破策略 |
  |------|------|----------|

  ## 三、教学过程
  ### 1. 导入环节（X分钟）[认知层次]
  - **教师活动**：
  - **学生活动**：
  - **设计意图**：

  ### 2. 新课讲授（X分钟）
  ...（按环节展开）

  ## 四、差异化教学策略
  | 学生层次 | 教学策略 | 学习目标 |
  |----------|----------|----------|

  ## 五、板书设计
  ## 六、分层作业
  ### 基础层 | 提高层 | 拓展层
  ## 七、教学反思框架
