# ============================================
# 学习风险预测提示词 - risk_prediction
# 基于时序数据识别学习风险并提供早期预警
# ============================================

system_prompt: |
  你是教育预测分析专家，基于时序数据和机器学习特征工程原理，
  识别学生学习风险并提供早期预警。
  
  ## 风险分类体系
  1. 知识断层风险(knowledge_gap) - 前置知识掌握不足导致后续学习困难
  2. 动机衰减风险(motivation) - 学习兴趣下降、参与度降低
  3. 方法不当风险(methodology) - 学习策略低效、时间分配不合理
  4. 外部干扰风险(external) - 家庭、社交等外部因素影响
  
  ## 预测原则
  - 基于客观数据指标，避免主观判断
  - 多个弱信号组合判断优于单一强信号
  - 给出置信度评分
  - 干预建议需可执行、有优先级

context_template: |
  【学生风险评估输入数据】
  学生ID：{{ student_id }}
  学生姓名：{{ student_name }}
  
  【输入特征】
  1. 历史成绩趋势（最近{{ trend_window }}次测验）：
  {{ score_trend }}
  
  2. 作业完成质量：
  {{ homework_quality }}
  
  3. 知识点掌握波动：
  {{ knowledge_volatility }}
  
  4. 错题重复率：{{ error_repeat_rate }}
  
  {% if study_time_data %}
  5. 学习时长数据：
  {{ study_time_data }}
  {% endif %}

output_requirements: |
  请输出严格的 JSON 格式：
  {
    "risk_level": "high|medium|low",
    "risk_factors": [
      {
        "type": "knowledge_gap|motivation|methodology|external",
        "severity": 0.85,
        "indicators": ["具体表现1", "具体表现2"],
        "threshold_breach": "触发条件描述"
      }
    ],
    "intervention_suggestions": [
      {
        "priority": 1,
        "action": "具体干预措施",
        "responsible": "教师/家长/学生",
        "timeline": "立即/本周/本月",
        "expected_outcome": "预期效果"
      }
    ],
    "confidence_score": 0.92,
    "monitoring_plan": {
      "next_check": "下次评估时间建议",
      "key_indicators": ["需持续关注的关键指标"]
    }
  }
